<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var t = (localStorage.getItem('CMS_THEME') || '').toString().trim().toLowerCase();
                document.documentElement.dataset.theme = (t === 'light' || t === 'claro') ? 'light' : 'dark';
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/Estilos/estilos_clientes.css">
    <title>Administración de Clientes</title>
</head>
<body>
    <header>
        <h1>Clientes</h1>
    </header>
    <main>
        <section id="accionesClientes">
            <div  id="botones">
                <button onclick="verTodosClientes()">Ver Todos los Clientes</button>
                <button onclick="agregarCliente()">Agregar Cliente</button>
            </div>
            <input type="text" placeholder="Ingresar nombre / telefono" id="buscarClienteInput">
        </section>

        <section id="listaClientes" style="display: none;">
            <div id="cabeceraLista">
                <h1>Lista de Clientes</h1>
                <button type="button" class="icon-btn" onclick="cerrarListaClientes()" aria-label="Cerrar lista" title="Cerrar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div id="contenedorListaClientes">

            </div>
        </section>

        <section id="detallesCliente" style="display: none;">
            <div id="headerDetalles">
                <h2>Datos del Cliente</h2>
                <button type="button" class="icon-btn" onclick="cerrarDetallesCliente()" aria-label="Cerrar detalles" title="Cerrar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <section id="datosCliente">
                <p class="subtitle muted">Resumen e información del cliente</p>
                <div id="infoCliente" style="margin:10px;">
                    <p id="nombreCliente">Nombre: <br>Cargando...</p>
                    <p id="telefonoCliente">Teléfono: <br>Cargando...</p>
                </div>
                <div id="valoresCliente">
                    <div class="valor-card success">
                        <span class="label">Total Pagado</span>
                        <span id="montototalPagado" class="amount">0.00</span>
                    </div>
                    <div class="valor-card danger" style="display: flex;
                    flex-direction: row; justify-content: space-between;">
                        <div>
                            <span class="label">Deuda Activa</span>
                            <span id="montototalAdeudado" class="amount">0.00</span>
                        </div>
                        <button onclick="enviarDeudaTotal()">Enviar Deuda por Whatsapp</button>
                    </div>
                </div>
            </section>
            <section id="operacionesCliente">
                <div class="section-header">
                    <h2>Operaciones del Cliente</h2>
                    <div class="actions">
                        <button id="btn_refrescar_cliente" class="btn" type="button">Refrescar</button>
                    </div>
                </div>
                <div class="tabs" role="tablist">
                    <button id="btn_ver_deudas_cliente" class="tab active" type="button" role="tab" aria-selected="true">Ver Deudas</button>
                    <button id="btn_ver_pagos_cliente" class="tab" type="button" role="tab" aria-selected="false">Ver Pagos</button>
                </div>
                <div id="lista_operaciones_cliente">
                    Cargando...
                </div>
            </section>
        </section>

    </main>
    <footer>
        <button type="button" onclick="Regresar()" aria-label="Regresar" title="Inicio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg>
        </button>

        <a href="/Plantillas/Configuracion.html" aria-label="Configuración" title="Configuración">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M11 10.27 7 3.34" />
                <path d="m11 13.73-4 6.93" />
                <path d="M12 22v-2" />
                <path d="M12 2v2" />
                <path d="M14 12h8" />
                <path d="m17 20.66-1-1.73" />
                <path d="m17 3.34-1 1.73" />
                <path d="M2 12h2" />
                <path d="m20.66 17-1.73-1" />
                <path d="m20.66 7-1.73 1" />
                <path d="m3.34 17 1.73-1" />
                <path d="m3.34 7 1.73 1" />
                <circle cx="12" cy="12" r="2" />
                <circle cx="12" cy="12" r="8" />
            </svg>
        </a>
        
        <button type="button" onclick="cerrarSesion()" aria-label="Cerrar sesión" title="Cerrar sesión">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
        </button>

    </footer>
    <script src="/Scripts/script_Adminclientes.js" type="module"></script>
</body>
</html>
