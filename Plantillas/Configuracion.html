<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var t = (localStorage.getItem('CMS_THEME') || '').toString().trim().toLowerCase();
                document.documentElement.dataset.theme = (t === 'light' || t === 'claro') ? 'light' : 'dark';
            } catch (e) { }
        })();
    </script>
    <link rel="stylesheet" href="/Estilos/estilos_config.css">
    <title>Config</title>
</head>

<body>
    <header>
        <div class="header-inner">
            <h1>Configuración</h1>
            <div class="header-actions">
                <a href="/Plantillas/Inicio.html" class="header-icon-btn"><img
                        aria-label="Inicio" title="Inicio">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                            <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        </svg>
                </a>
                <button type="button" onclick="cerrarSesion()" class="header-icon-btn" aria-label="Cerrar sesión" title="Cerrar sesión">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                </button>
            </div>
        </div>
    </header>
    <main>
        <section>
            <h1>Datos Personales</h1>
            <div>
                <img src="" id="pfp" alt="imagen usuario">
                <p id="Datos_cuenta">...</p>
            </div>
        </section>
        <section>
            <h1>Preferencias</h1>
            <div>
                <div>
                    <h3>Preferencia de idioma</h3>
                    <button id="idioma-btn">Cambiar Idioma</button>
                </div>
                <div>
                    <h3>Preferencias Visuales</h3>
                    <div class="theme-toggle" aria-label="Tema">
                        <span class="theme-toggle__label theme-toggle__label--light">Claro</span>
                        <button id="modo-oscuro-btn" class="ios-switch" type="button" role="switch" aria-checked="false"
                            aria-label="Cambiar tema"></button>
                        <span class="theme-toggle__label theme-toggle__label--dark">Oscuro</span>
                    </div>
                    <button id="transparencia-btn">Transparencia</button>
                </div>
                <div>
                    <button id="eliminar-cuenta-btn">Eliminar Cuenta</button>
                </div>
            </div>
        </section>
        <section>
            <p>&copy; <a href="https://djsolutionss.netlify.app">DJ Solutions</a> <span id="anio"></span> Client
                Management System</p>
        </section>
    </main>


    <script src="/Scripts/script_config.js" type="module"></script>
</body>

</html>
