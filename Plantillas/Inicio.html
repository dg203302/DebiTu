<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        (function () {
            try {
                var t = (localStorage.getItem('CMS_THEME') || '').toString().trim().toLowerCase();
                document.documentElement.dataset.theme = (t === 'light' || t === 'claro') ? 'light' : 'dark';
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/Estilos/estilos_inicio.css">
    <title>Inicio</title>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-text">
                <h1>Inicio</h1>
                <p id="bienvenida"></p>
            </div>
            <div class="header-actions">
                <a class="icon-btn" href="/Plantillas/administracion_clientes.html" aria-label="Administrar clientes" title="Clientes">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                </a>
                <a href="/Plantillas/Configuracion.html" class="pfp-link" aria-label="Configuración" title="Configuración">
                    <img src="" alt="Foto de perfil" id="pfp">
                </a>
                <button type="button" class="icon-btn" onclick="cerrarSesion()" aria-label="Cerrar sesión" title="Cerrar sesión">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </div>
    </header>
    <main>
        <section id="kpi_adeudado_mes">
            <div id="deuda_total">
                <h2>Deuda Total Activa</h2>
                <h1 id="total_adeudado_mes">Cargando...</h1>
            </div>
            <button type="button" class="icon-btn" onclick="recargarMontos()" aria-label="Recargar montos" title="Recargar">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            </button>
        </section>
        
        <section id="btnes_nav">
            <a class="nav-card" href="/Plantillas/administracion_clientes.html">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                <div class="nav-card__text">
                    <span class="nav-card__title">Administrar Clientes</span>
                    <span class="nav-card__subtitle">Altas, bajas y operaciones</span>
                </div>
            </a>
            <button type="button" class="nav-card nav-card--primary" id="btn_realiz_op" onclick="realizarOperacion(event)" aria-expanded="false" aria-controls="Operacion-ingreso">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M8 12h8" />
                    <path d="M12 8v8" />
                </svg>
                <div class="nav-card__text">
                    <span class="nav-card__title">Realizar Operación</span>
                    <span class="nav-card__subtitle">Registrar pago o deuda</span>
                </div>
            </button>
        </section>
        <section id="Operacion-ingreso" hidden>
            <h2>Registrar Operación</h2>
            <div class="op-reg">
                <label for="op_clientSearch" style="font-weight:600">Buscar Cliente (nombre o teléfono)</label>
                <input id="op_clientSearch" placeholder="Escribe nombre o teléfono" autocomplete="off" inputmode="search">
                <div id="op_clientMatches" class="client-matches" aria-live="polite"></div>

                <label for="op_category" style="font-weight:600">Detalles</label>
                <input id="op_category" placeholder="Detalles (p.ej. Servicio, Producto)">

                <label for="op_amount" style="font-weight:600">Monto</label>
                <input id="op_amount" class="reg-amount" value="0" inputmode="decimal">

                <div id="op_calc" class="calc-grid" aria-label="Calculadora">
                    <button type="button" class="calc-btn" data-key="7">7</button>
                    <button type="button" class="calc-btn" data-key="8">8</button>
                    <button type="button" class="calc-btn" data-key="9">9</button>
                    <button type="button" class="calc-op" data-op="/">÷</button>

                    <button type="button" class="calc-btn" data-key="4">4</button>
                    <button type="button" class="calc-btn" data-key="5">5</button>
                    <button type="button" class="calc-btn" data-key="6">6</button>
                    <button type="button" class="calc-op" data-op="*">×</button>

                    <button type="button" class="calc-btn" data-key="1">1</button>
                    <button type="button" class="calc-btn" data-key="2">2</button>
                    <button type="button" class="calc-btn" data-key="3">3</button>
                    <button type="button" class="calc-op" data-op="-">-</button>

                    <button type="button" class="calc-btn" data-key="0">0</button>
                    <button type="button" class="calc-btn" data-key=".">.</button>
                    <button type="button" id="op_calc_eq">=</button>
                    <button type="button" class="calc-op" data-op="+">+</button>
                </div>

                <div class="reg-actions">
                    <button type="button" id="op_calc_back" title="Borrar un dígito">⌫</button>
                    <button type="button" id="op_calc_clear">C</button>
                </div>

                <div class="type-row" role="radiogroup" aria-label="Tipo de operación">
                    <label class="type-option" for="op_chkPago">
                        <input type="radio" name="op_tipo" id="op_chkPago" value="pago">
                        Pago
                    </label>
                    <label class="type-option" for="op_chkDeuda">
                        <input type="radio" name="op_tipo" id="op_chkDeuda" value="deuda" checked>
                        Deuda
                    </label>
                </div>

                <div class="op-submit">
                    <button type="button" id="op_registrar" class="btn">Registrar Operación</button>
                </div>
            </div>
        </section>
        <section id="operaciones_rec">
            <div class="section-title-row">
                <h2>Operaciones Recientes</h2>
                <div class="section-actions" id="botones">
                    <button type="button" class="icon-btn" onclick="recargarTabla()" aria-label="Refrescar operaciones" title="Refrescar">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                            <path d="M3 3v5h5" />
                        </svg>
                    </button>
                    <button type="button" class="icon-btn" id="btn_expandir_ops" onclick="expandirTabla()" aria-expanded="false" aria-label="Expandir operaciones" title="Expandir">
                        <svg class="icon icon-rotate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="7 13 12 18 17 13" />
                            <polyline points="7 6 12 11 17 6" />
                        </svg>
                        <span class="btn-label">Expandir</span>
                    </button>
                </div>
            </div>
            <div class="tabs" role="tablist" aria-label="Filtro de operaciones">
                <button id="btn_ver_deudas" class="tab active" type="button" role="tab" aria-selected="true">Ver Deudas</button>
                <button id="btn_ver_pagos" class="tab" type="button" role="tab" aria-selected="false">Ver Pagos</button>
            </div>
            <div id="lista_operaciones">
                Cargando...
            </div>
        </section>

    </main>


    <script src="/Scripts/script_inicio.js" type="module"></script>
</body>
</html>
