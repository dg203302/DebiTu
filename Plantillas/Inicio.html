<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <script>
        (function () {
            try {
                var t = (localStorage.getItem('CMS_THEME') || '').toString().trim().toLowerCase();
                document.documentElement.dataset.theme = (t === 'light' || t === 'claro') ? 'light' : 'dark';
                var a = localStorage.getItem('CMS_ANIM');
                if (a === 'false') document.documentElement.dataset.anim = 'false'; var tr = localStorage.getItem('CMS_TRANS'); if (tr === 'false') document.documentElement.dataset.trans = 'false';
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/Estilos/estilos_inicio.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | DebiTú</title>
</head>
<body>
    <!-- Capas de Glassmorphism (Fondo) -->
    <div class="ambient-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="glass-overlay"></div>
    </div>

    <header class="navbar">
        <div class="header-inner">
            <div class="header-text">
                <h1 id="header_titulo">Inicio</h1>
            </div>
        </div>
    </header>

    <main class="dashboard-layout">
        <section id="kpi_adeudado_mes" class="glass-panel">
            <div id="deuda_total">
                <p class="kpi-label">Deuda Total Activa</p>
                <h1 id="total_adeudado_mes" class="text-gradient">Cargando...</h1>
            </div>
            <div class="kpi-actions" style="display: flex; gap: 12px; align-items: center;">
                <button type="button" class="icon-btn btn-large" onclick="recargarMontos()" aria-label="Recargar montos" title="Actualizar KPI">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                </button>
                <button type="button" id="btn_realiz_op_mob" class="icon-btn btn-large pulse-glow mobile-op-btn" onclick="realizarOperacion(event)" aria-label="Nueva Operación" title="Nueva Operación">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color: var(--accent-color);">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 12h8" />
                        <path d="M12 8v8" />
                    </svg>
                </button>
            </div>
        </section>
        
        <section id="btnes_nav" class="nav-grid">
            <!--<a class="nav-card glass-panel interactive-panel" href="/Plantillas/administracion_clientes.html">
                <div class="nav-icon bg-blue-gradient">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                </div>
                <div class="nav-card__text">
                    <span class="nav-card__title">Directorio de Clientes</span>
                    <span class="nav-card__subtitle">Gestión de perfiles y estados</span>
                </div>
            </a>-->
            <button type="button" class="nav-card nav-card--primary glass-panel interactive-panel pulse-glow desktop-op-btn" id="btn_realiz_op" onclick="realizarOperacion(event)" aria-expanded="false" aria-controls="Operacion-ingreso">
                <div class="nav-icon bg-accent-gradient">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 12h8" />
                        <path d="M12 8v8" />
                    </svg>
                </div>
                <div class="nav-card__text">
                    <span class="nav-card__title">Nueva Operación</span>
                    <span class="nav-card__subtitle">Registrar un pago o deuda</span>
                </div>
                <span class="nav-card__status-dot" aria-hidden="true"></span>
            </button>
        </section>

        <section id="Operacion-ingreso" class="glass-panel" hidden>
            <h2 class="panel-title">Detalles de Operación</h2>
            <div class="op-reg">

                <div class="type-row type-row--cards" role="radiogroup" aria-label="Tipo de operación">
                    <label class="type-option" for="op_chkPago">
                        <input type="radio" name="op_tipo" id="op_chkPago" value="pago">
                        <span class="type-option__content">
                            <span class="type-option__title">Pago Recibido</span>
                            <span class="type-option__meta">Descuenta saldo pendiente</span>
                        </span>
                    </label>
                    <label class="type-option" for="op_chkDeuda">
                        <input type="radio" name="op_tipo" id="op_chkDeuda" value="deuda" checked>
                        <span class="type-option__content">
                            <span class="type-option__title">Cargar Deuda</span>
                            <span class="type-option__meta">Registra un nuevo monto adeudado</span>
                        </span>
                    </label>
                </div>
                
                <div class="input-wrapper">
                    <label for="op_clientSearch">Buscar Cliente</label>
                    <input id="op_clientSearch" class="modern-input" placeholder="Ingresa nombre o teléfono..." autocomplete="off" inputmode="search">
                    <div id="op_clientMatches" class="client-matches" aria-live="polite"></div>
                </div>

                <div class="input-wrapper">
                    <label for="op_category">Concepto o Detalle</label>
                    <input id="op_category" class="modern-input" placeholder="Ej: Pago de cuota, Servicio...">
                </div>

                <div class="input-wrapper amount-wrapper">
                    <label for="op_total_amount">Monto total a registrar ($)</label>
                    <input id="op_total_amount" class="modern-input reg-amount" value="0" inputmode="decimal" autocomplete="off" spellcheck="false">
                    <input id="op_total_amount_value" type="hidden" value="0">
                </div>

                <details id="op_calc_shell" class="calc-shell" open>
                    <summary class="calc-summary" aria-controls="op_calc_body">
                        <span class="calc-summary__title">Calculadora</span>
                        <span class="calc-summary__chev" aria-hidden="true">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9" />
                            </svg>
                        </span>
                    </summary>

                    <div id="op_calc_body" class="calc-body">
                        <div class="input-wrapper">
                            <label for="op_amount">Operación</label>
                            <input id="op_amount" class="modern-input calc-display" value="0" inputmode="text" autocomplete="off" spellcheck="false">
                        </div>

                        <div id="op_calc" class="calc-grid" aria-label="Calculadora">
                            <button type="button" class="calc-btn" data-key="7">7</button>
                            <button type="button" class="calc-btn" data-key="8">8</button>
                            <button type="button" class="calc-btn" data-key="9">9</button>
                            <button type="button" class="calc-op" data-op="/">÷</button>

                            <button type="button" class="calc-btn" data-key="4">4</button>
                            <button type="button" class="calc-btn" data-key="5">5</button>
                            <button type="button" class="calc-btn" data-key="6">6</button>
                            <button type="button" class="calc-op" data-op="*">×</button>

                            <button type="button" class="calc-btn" data-key="1">1</button>
                            <button type="button" class="calc-btn" data-key="2">2</button>
                            <button type="button" class="calc-btn" data-key="3">3</button>
                            <button type="button" class="calc-op" data-op="-">-</button>

                            <button type="button" class="calc-btn" data-key="0">0</button>
                            <button type="button" class="calc-btn" data-key=".">.</button>
                            <button type="button" id="op_calc_eq">=</button>
                            <button type="button" class="calc-op" data-op="+">+</button>
                        </div>

                        <div class="reg-actions">
                            <button type="button" id="op_calc_back" class="btn-clear secondary" title="Borrar un dígito">⌫</button>
                            <button type="button" id="op_calc_clear" class="btn-clear danger">Limpiar (C)</button>
                        </div>
                    </div>
                </details>

                <div class="op-submit">
                    <button type="button" id="op_registrar" class="btn btn-primary large">Registrar Operación</button>
                </div>
            </div>
        </section>

        <section id="operaciones_rec" class="glass-panel">
            <div class="section-title-row">
                <h2 class="panel-title">Operaciones Recientes</h2>
                <div class="section-actions" id="botones">
                    <button type="button" class="icon-btn tooltip-btn" onclick="recargarTabla()" aria-label="Refrescar operaciones" title="Refrescar vista">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                            <path d="M3 3v5h5" />
                        </svg>
                    </button>
                    <button type="button" class="icon-btn btn-text" id="btn_expandir_ops" onclick="expandirTabla()" aria-expanded="false" aria-label="Expandir operaciones">
                        <svg class="icon icon-rotate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="7 13 12 18 17 13" />
                            <polyline points="7 6 12 11 17 6" />
                        </svg>
                        <span class="btn-label">Expandir</span>
                    </button>
                </div>
            </div>
            
            <div class="tabs modern-tabs" role="tablist" aria-label="Filtro de operaciones">
                <button id="btn_ver_deudas" class="tab active" type="button" role="tab" aria-selected="true">Deudas Activas</button>
                <button id="btn_ver_pagos" class="tab" type="button" role="tab" aria-selected="false">Pagos Recibidos</button>
            </div>
            
            <div id="lista_operaciones" class="modern-list">
                <div class="loading-state">Obteniendo historial...</div>
            </div>
        </section>

    </main>

    <footer class="bottom-nav" aria-label="Navegación">
        <a class="icon-btn" href="/Plantillas/administracion_clientes.html" aria-label="Clientes" title="Clientes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
        </a>

        <a class="icon-btn active" href="/Plantillas/Inicio.html" aria-label="Inicio" title="Inicio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg>
        </a>

        <a class="icon-btn" href="/Plantillas/Estadisticas.html" aria-label="Estadísticas"
            title="Estadísticas">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" aria-hidden="true">
                    <line x1="6" y1="20" x2="6" y2="14" />
                    <line x1="12" y1="20" x2="12" y2="4" />
                    <line x1="18" y1="20" x2="18" y2="10" />
                </svg>
        </a>

        <a class="icon-btn" href="/Plantillas/Configuracion.html" aria-label="Configuración" title="Configuración">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09A1.65 1.65 0 0 0 19.4 15z" />
            </svg>
        </a>

        <button type="button" class="icon-btn danger" onclick="cerrarSesion()" aria-label="Cerrar sesión" title="Cerrar sesión">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
        </button>
    </footer>

    <script src="/Scripts/script_inicio.js" type="module"></script>
</body>
</html>
