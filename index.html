<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var t = (localStorage.getItem('CMS_THEME') || '').toString().trim().toLowerCase();
                document.documentElement.dataset.theme = (t === 'light' || t === 'claro') ? 'light' : 'dark';
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/Estilos/estilos_pantalla_carga.css">
    <title>Bienvenido</title>
</head>
<body>
    <!-- Capas de Glassmorphism (Fondo) -->
    <div class="ambient-background" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="glass-overlay"></div>
    </div>

    <main id="loading-screen" role="status" aria-live="polite" aria-busy="true">
        <svg class="loading-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2v4" />
            <path d="m16.2 7.8 2.9-2.9" />
            <path d="M18 12h4" />
            <path d="m16.2 16.2 2.9 2.9" />
            <path d="M12 18v4" />
            <path d="m4.9 19.1 2.9-2.9" />
            <path d="M2 12h4" />
            <path d="m4.9 4.9 2.9 2.9" />
        </svg>
        <h1 class="loading-title">Cargando…</h1>
        <p id="loading-status" class="loading-subtitle">Verificando sesión</p>
    </main>
    <script type="module">
        import { loadSupaBseWithAuth } from '../Scripts/supabase.js';

        const statusEl = document.getElementById('loading-status');
        const setStatus = (msg) => { if (statusEl) statusEl.textContent = msg; };

        (async () => {
            try {
                setStatus('Cargando Supabase…');
                const clientesup = await loadSupaBseWithAuth();

                setStatus('Verificando sesión…');
                const id_usuario = localStorage.getItem('UserID');
                if (id_usuario) {
                    window.location.href = '/Plantillas/Inicio.html';
                    return;
                }

                const {data: { session }, error} = await clientesup.auth.getSession();
                if (error) {
                    setStatus('Error al obtener la sesión');
                    alert('Error al obtener la sesión: ' + (error.message || error));
                    return;
                }

                if (session) {
                    localStorage.setItem('UserID', session.user.id);

                    const meta = session.user?.user_metadata || {};
                    const identity0 = Array.isArray(session.user?.identities)
                        ? session.user.identities[0]?.identity_data
                        : null;

                    const userName = (meta.full_name || meta.name || meta.user_name || meta.username || session.user?.email || '').toString().trim();
                    if (userName) localStorage.setItem('UserName', userName);
                    else localStorage.removeItem('UserName');

                    const userPhoto = (meta.avatar_url || meta.picture || identity0?.avatar_url || identity0?.picture || '').toString().trim();
                    if (userPhoto) localStorage.setItem('UserPhoto', userPhoto);
                    else localStorage.removeItem('UserPhoto');
                    window.location.href = '/Plantillas/Inicio.html';
                    return;
                }

                window.location.href = '/Plantillas/inicio_sesion.html';
            } catch (e) {
                console.error(e);
                setStatus('Ocurrió un error');
                alert('Ocurrió un error al iniciar: ' + (e?.message || e));
            }
        })();
    </script>
</body>
</html>
